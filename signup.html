<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — TheNetSMM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="avatar-wrap">
      <div class="avatar-circle">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>
    </div>

    <h1 class="auth-title">Sign Up</h1>
    <div class="alert" id="alert"></div>

    <form id="signupForm" novalidate>

      <div class="form-group">
        <label class="form-label">Name</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          <input type="text" id="name" placeholder="Enter your name" autocomplete="name" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
          <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" required />
          <button type="button" class="eye-btn" onclick="togglePw('password','eyeIcon1')">
            <svg id="eyeIcon1" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Terms agreement -->
      <p style="font-size:.78rem;color:#6B7280;text-align:center;margin-bottom:14px;line-height:1.6">
        Sign up ပြုလုပ်ခြင်းဖြင့် ကျွန်ုပ်တို့၏
        <a href="/login#terms" style="color:#7C3AED;font-weight:700;text-decoration:none">Terms of Service</a>
        ကို လက်ခံပြီးဖြစ်သည်ဟု မှတ်ယူပါသည်။
      </p>

      <button type="submit" class="btn-primary" id="signupBtn">Sign Up</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="/login">Log In &rsaquo;</a>
    </p>

  </div>

  <script src="config.js">
function goToLogin() {
  // Clear any stale user data before going to login
  localStorage.removeItem('smm_user');
  window.location.replace('/login');
}
</script>
  <script>
    
    function togglePw(inputId, iconId) {
      const pw   = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = `<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
      } else {
        pw.type = 'password';
        icon.innerHTML = `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      }
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('alert');
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!name || !email || !password) { showAlert('alert', 'Please fill in all fields.'); return; }
      if (password.length < 6) { showAlert('alert', 'Password must be at least 6 characters.'); return; }
      setLoading('signupBtn', true, 'Sign Up');
      try {
        const data = await apiCall('/api/auth/signup', 'POST', { name, email, password });
        const codes = data.backupCodes || [];

        // Hide form, clear alerts
        const form = document.getElementById('signupForm');
        if (form) form.style.display = 'none';
        const alertEl = document.getElementById('alert');
        if (alertEl) alertEl.className = 'alert';

        const box = document.createElement('div');
        box.style.cssText = 'padding:8px 0';
        box.innerHTML = `
          <div style="text-align:center;margin-bottom:18px">
            <div style="font-size:2.5rem;margin-bottom:10px">🔐</div>
            <h2 style="color:#1E1B4B;font-size:1.15rem;font-weight:900;margin-bottom:6px">Account Created!</h2>
            <p style="color:#374151;font-size:.85rem;line-height:1.6">
              Backup Codes ကို <strong>ယခုချက်ချင်း</strong> screenshot ရိုက်ပါ
            </p>
          </div>
          <div style="background:#FEF3C7;border:2px solid #F59E0B;border-radius:14px;padding:14px;margin-bottom:16px">
            <p style="color:#92400E;font-size:.82rem;font-weight:800;margin-bottom:10px">
              ⚠️ ဒီ codes တွေကို ထပ်မကြည့်နိုင်တော့ပါ — ယခုပဲ သိမ်းပါ!
            </p>
            <p style="color:#78350F;font-size:.78rem;line-height:1.6;margin-bottom:12px">
              • Password မေ့ရင် ဒီ codes ဖြင့်သာ ပြောင်းနိုင်သည်<br>
              • Code တစ်ခုကို တစ်ကြိမ်သာ သုံးနိုင်သည်
            </p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              ${codes.map(c => \`
                <div style="background:#fff;border:2px solid #D97706;border-radius:10px;
                     padding:10px;text-align:center;font-family:monospace;
                     font-size:.9rem;font-weight:900;color:#1E1B4B;letter-spacing:.1em">
                  \${c}
                </div>\`).join('')}
            </div>
          </div>
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;
                 margin-bottom:16px;padding:12px;background:#F0FDF4;
                 border:1.5px solid #BBF7D0;border-radius:12px">
            <input type="checkbox" id="confirmSaved"
              style="width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:#059669"/>
            <span style="font-size:.83rem;color:#166534;font-weight:700;line-height:1.5">
              ✅ Codes တွေကို screenshot ရိုက်ပြီး သိမ်းဆည်းပြီးပြီ
            </span>
          </label>
          <button id="goLoginBtn" onclick="goToLogin()" disabled
            style="width:100%;padding:14px;border:none;border-radius:14px;
                   background:linear-gradient(90deg,#7B3FBF,#E91E8C);color:#fff;
                   font-size:.95rem;font-weight:800;cursor:not-allowed;opacity:.4;
                   transition:opacity .2s;font-family:inherit">
            Login ဝင်မည် →
          </button>`;

        document.querySelector('.auth-card').appendChild(box);

        document.getElementById('confirmSaved').addEventListener('change', function() {
          const btn = document.getElementById('goLoginBtn');
          btn.disabled = !this.checked;
          btn.style.opacity = this.checked ? '1' : '.4';
          btn.style.cursor  = this.checked ? 'pointer' : 'not-allowed';
        });
      } catch (err) {
        showAlert('alert', err.message);
      } finally {
        setLoading('signupBtn', false, 'Sign Up');
      }
    });
  </script>
</body>
</html>
