<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password — TheNetSMM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:linear-gradient(135deg,#230769,#5B1AB0 30%,#9B2FC9 62%,#E91E8C);--btn-grad:linear-gradient(90deg,#7B3FBF,#E91E8C);--font:'Nunito',system-ui,sans-serif}
    body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;-webkit-font-smoothing:antialiased}
    .brand-card{display:flex;flex-direction:column;align-items:center;margin-bottom:18px}
    .brand-logo{font-size:1.9rem;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:13px}.brand-logo span{color:#E91E8C}
    .brand-lines{width:200px;display:flex;flex-direction:column;gap:7px}
    .brand-line{height:4px;border-radius:3px;background:linear-gradient(90deg,#7C3AED,#E91E8C)}
    .brand-line:nth-child(1){width:100%}.brand-line:nth-child(2){width:65%}.brand-line:nth-child(3){width:40%}
    .auth-card{background:#fff;border-radius:26px;padding:36px 30px;width:100%;max-width:440px;box-shadow:0 24px 70px rgba(0,0,0,.32)}
    .icon-wrap{display:flex;justify-content:center;margin-bottom:14px}
    .icon-circle{width:68px;height:68px;background:linear-gradient(135deg,#C026D3,#7C3AED);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(124,58,237,.4)}
    .icon-circle svg{width:34px;height:34px;fill:#fff}
    .auth-title{font-size:1.6rem;font-weight:900;color:#111827;text-align:center;margin-bottom:6px}
    .auth-subtitle{font-size:.85rem;color:#6B7280;text-align:center;margin-bottom:22px;line-height:1.6}
    .alert{padding:11px 14px;border-radius:12px;font-size:.875rem;font-weight:700;text-align:center;margin-bottom:14px;display:none}
    .alert.show{display:block}
    .alert-error{background:#FEF2F2;border:1.5px solid #FECACA;color:#DC2626}
    .alert-success{background:#F0FDF4;border:1.5px solid #BBF7D0;color:#16A34A}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:.85rem;font-weight:700;color:#374151;margin-bottom:6px}
    .form-hint{font-size:.75rem;color:#9CA3AF;margin-top:4px}
    .input-wrap{display:flex;align-items:center;gap:10px;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:13px;padding:12px 14px;transition:border-color .2s,background .2s}
    .input-wrap:focus-within{border-color:#9333EA;background:#fff}
    .input-wrap>svg{flex-shrink:0;width:18px;height:18px;fill:#A78BFA}
    .input-wrap input{flex:1;border:none;background:transparent;outline:none;font-size:.88rem;font-weight:600;font-family:var(--font);color:#374151;letter-spacing:.05em}
    .input-wrap input::placeholder{color:#9CA3AF;font-weight:500;letter-spacing:0}
    .code-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .code-hint{grid-column:1/-1;background:#EDE9FE;border-radius:10px;padding:10px 12px;font-size:.78rem;color:#5B21B6;font-weight:700;line-height:1.5}
    .btn-primary{width:100%;padding:14px;border:none;border-radius:14px;background:var(--btn-grad);color:#fff;font-size:.95rem;font-weight:800;font-family:var(--font);cursor:pointer;box-shadow:0 5px 20px rgba(139,47,201,.42);transition:opacity .2s,transform .1s}
    .btn-primary:hover{opacity:.91}.btn-primary:active{transform:scale(.97)}.btn-primary:disabled{opacity:.55;cursor:not-allowed}
    .spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .auth-link{text-align:center;font-size:.85rem;color:#6B7280;margin-top:16px}
    .auth-link a{color:#7C3AED;font-weight:800;text-decoration:none}
    .divider{border:none;border-top:1.5px solid #F3F4F6;margin:18px 0}
    .new-pw-section{display:none}
    .eye-btn{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;color:#9CA3AF}
    .eye-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
  </style>
</head>
<body>
  <div class="brand-card">
    <div class="brand-logo">TheNet<span>SMM</span></div>
    <div class="brand-lines"><div class="brand-line"></div><div class="brand-line"></div><div class="brand-line"></div></div>
  </div>

  <div class="auth-card">
    <div class="icon-wrap">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
      </div>
    </div>

    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Enter your email, a backup code, and your new password.</p>

    <div class="alert" id="alert"></div>

    <!-- Step 1: Email + Backup code -->
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Backup Code</label>
      <div class="code-hint">
        🔐 Signup လုပ်တဲ့အခါ ပေးထားသော backup code တစ်ခု ထည့်ပါ<br>
        <span style="opacity:.75">(ဥပမာ: A3F9B2C1D4)</span>
      </div>
      <div class="input-wrap" style="margin-top:8px;font-family:monospace">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
        <input type="text" id="backupCode" placeholder="XXXXXXXXXX" maxlength="12"
               style="text-transform:uppercase;letter-spacing:.12em;font-family:monospace"
               oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"/>
      </div>
      <p class="form-hint">Each backup code is one-time use only.</p>
    </div>

    <hr class="divider"/>

    <!-- New Password -->
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
        <input type="password" id="newPass" placeholder="Min 6 characters" autocomplete="new-password"/>
        <button type="button" class="eye-btn" onclick="togglePw('newPass','eyeIcon')">
          <svg id="eyeIcon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="resetBtn" onclick="doReset()">Reset Password</button>
    <p class="auth-link">Remember your password? <a href="/login">Log In &rsaquo;</a></p>
  </div>

  <script src="config.js"></script>
  <script>
    function togglePw(inputId, iconId) {
      const pw = document.getElementById(inputId);
      const ic = document.getElementById(iconId);
      if (pw.type === 'password') {
        pw.type = 'text';
        ic.innerHTML = `<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
      } else {
        pw.type = 'password';
        ic.innerHTML = `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      }
    }

    async function doReset() {
      const alertEl = document.getElementById('alert');
      alertEl.className = 'alert';
      const email      = document.getElementById('email').value.trim();
      const backupCode = document.getElementById('backupCode').value.trim();
      const newPass    = document.getElementById('newPass').value;

      if (!email)      { alertEl.className='alert show alert-error'; alertEl.textContent='Email ထည့်ပါ'; return; }
      if (!backupCode) { alertEl.className='alert show alert-error'; alertEl.textContent='Backup Code ထည့်ပါ'; return; }
      if (!newPass || newPass.length < 6) {
        alertEl.className='alert show alert-error';
        alertEl.textContent='Password အနည်းဆုံး 6 လုံးဖြစ်ရမည်'; return;
      }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Verifying...';

      try {
        const data = await apiCall('/api/auth/reset-password', 'POST',
          { email, backupCode, newPassword: newPass });
        alertEl.className = 'alert show alert-success';
        alertEl.textContent = '✅ ' + data.message + ' Login page သို့ redirect လုပ်မည်...';
        setTimeout(() => window.location.replace('/login'), 2500);
      } catch (err) {
        alertEl.className = 'alert show alert-error';
        alertEl.textContent = err.message || 'Reset မအောင်မြင်ပါ';
        btn.disabled = false; btn.textContent = 'Reset Password';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
  </script>
</body>
</html>
