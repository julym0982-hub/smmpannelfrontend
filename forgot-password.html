<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — TheNetSMM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: linear-gradient(135deg, #230769 0%, #5B1AB0 30%, #9B2FC9 62%, #E91E8C 100%);
      --btn-grad: linear-gradient(90deg, #7B3FBF 0%, #E91E8C 100%);
      --avatar-grad: linear-gradient(135deg, #C026D3 0%, #7C3AED 100%);
      --font: 'Nunito', system-ui, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* Brand card */
    .brand-card {
      display: flex; flex-direction: column;
      align-items: center; margin-bottom: 18px;
    }
    .brand-logo {
      font-size: 1.9rem; font-weight: 900;
      color: #fff; letter-spacing: -0.5px;
      margin-bottom: 13px;
    }
    .brand-logo span { color: #E91E8C; }
    .brand-lines { width: 200px; display: flex; flex-direction: column; gap: 7px; }
    .brand-line {
      height: 4px; border-radius: 3px;
      background: linear-gradient(90deg, #7C3AED, #E91E8C);
    }
    .brand-line:nth-child(1) { width: 100%; }
    .brand-line:nth-child(2) { width: 65%; }
    .brand-line:nth-child(3) { width: 40%; }

    /* Auth card */
    .auth-card {
      background: #fff; border-radius: 26px;
      padding: 40px 34px; width: 100%; max-width: 420px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.32);
    }

    .avatar-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
    .avatar-circle {
      width: 74px; height: 74px;
      background: var(--avatar-grad); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 22px rgba(124,58,237,0.4);
    }
    .avatar-circle svg { width: 37px; height: 37px; fill: white; }

    .auth-title {
      font-size: 1.9rem; font-weight: 900;
      color: #111827; text-align: center; margin-bottom: 8px;
    }
    .auth-subtitle {
      font-size: 0.875rem; color: #6B7280; font-weight: 500;
      text-align: center; margin-bottom: 24px; line-height: 1.55;
    }

    .alert {
      padding: 11px 14px; border-radius: 12px;
      font-size: 0.875rem; font-weight: 700;
      text-align: center; margin-bottom: 14px; display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: #FEF2F2; border: 1.5px solid #FECACA; color: #DC2626; }
    .alert-success { background: #F0FDF4; border: 1.5px solid #BBF7D0; color: #16A34A; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 700; color: #374151; margin-bottom: 7px; }

    .input-wrap {
      display: flex; align-items: center; gap: 10px;
      background: #F9FAFB; border: 1.5px solid #E5E7EB;
      border-radius: 14px; padding: 12px 14px;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-wrap:focus-within { border-color: #9333EA; background: #fff; }
    .input-wrap > svg { flex-shrink: 0; width: 19px; height: 19px; fill: #A78BFA; }
    .input-wrap input {
      flex: 1; border: none; background: transparent; outline: none;
      font-size: 0.88rem; font-weight: 600; font-family: var(--font); color: #374151;
    }
    .input-wrap input::placeholder { color: #9CA3AF; font-weight: 500; }

    .eye-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; color: #9CA3AF; }
    .eye-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }

    .btn-primary {
      width: 100%; padding: 15px; border: none; border-radius: 14px;
      background: var(--btn-grad); color: #fff;
      font-size: 1rem; font-weight: 800; font-family: var(--font);
      cursor: pointer; box-shadow: 0 5px 20px rgba(139,47,201,0.42);
      transition: opacity 0.2s, transform 0.1s; margin-top: 4px;
    }
    .btn-primary:hover { opacity: 0.91; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 7px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-footer-p { text-align: center; font-size: 0.875rem; color: #6B7280; font-weight: 500; margin-top: 18px; }
    .auth-footer-p a { color: #7C3AED; font-weight: 800; text-decoration: none; }
    .auth-footer-p a:hover { color: #E91E8C; }
  </style>
</head>
<body>

  <!-- Brand card with 3 lines -->
  <div class="brand-card">
    <div class="brand-logo">TheNet<span>SMM</span></div>
    <div class="brand-lines">
      <div class="brand-line"></div>
      <div class="brand-line"></div>
      <div class="brand-line"></div>
    </div>
  </div>

  <!-- Auth card -->
  <div class="auth-card">
    <div class="avatar-wrap">
      <div class="avatar-circle">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
      </div>
    </div>
    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-subtitle">Enter your email and create a new password to reset your account.</p>

    <div class="alert" id="alert"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Backup Code</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
        <input type="text" id="backupCode" placeholder="XXXX-XXXX"
          maxlength="9" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')"
          autocomplete="off" spellcheck="false" style="letter-spacing:2px;font-weight:700"/>
      </div>
      <p style="font-size:.75rem;color:#9CA3AF;margin-top:5px">
        One of the 8 backup codes you saved when you signed up
      </p>
    </div>

    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
        <input type="password" id="newPassword" placeholder="Create new password" autocomplete="new-password" />
        <button type="button" class="eye-btn" onclick="togglePw()">
          <svg id="eyeIcon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    
      <div class="form-group" id="newPwGroup">
        <label class="form-label">New Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
          <input type="password" id="newPass" placeholder="New password (min 6 chars)" autocomplete="new-password"/>
        </div>
      </div>
      <button class="btn-primary" id="resetBtn" onclick="doReset()">Reset Password</button>

    <p class="auth-footer-p">Remember your password? <a href="/login">Log In &rsaquo;</a></p>
  </div>

  <script src="config.js"></script>
  <script>
    function togglePw() {
      const pw   = document.getElementById('newPassword');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = `<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
      } else {
        pw.type = 'password';
        icon.innerHTML = `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      }
    }

    async function doReset() {
      const alertEl    = document.getElementById('alert');
      alertEl.className = 'alert';
      const email      = document.getElementById('email')?.value.trim()     || '';
      const backupCode = document.getElementById('backupCode')?.value.trim() || '';
      const newPass    = document.getElementById('newPass')?.value
                      || document.getElementById('newPassword')?.value || '';

      if (!email) {
        alertEl.className = 'alert show alert-error';
        alertEl.textContent = 'Please enter your email address.'; return;
      }
      if (!backupCode || backupCode.replace('-','').length < 8) {
        alertEl.className = 'alert show alert-error';
        alertEl.textContent = 'Please enter your backup code (XXXX-XXXX).'; return;
      }
      if (!newPass || newPass.length < 6) {
        alertEl.className = 'alert show alert-error';
        alertEl.textContent = 'New password must be at least 6 characters.'; return;
      }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Verifying...';

      try {
        const data = await apiCall('/api/auth/reset-password', 'POST', {
          email,
          backupCode: backupCode.toUpperCase(),
          newPassword: newPass,
        });
        alertEl.className = 'alert show alert-success';
        alertEl.textContent = '✅ ' + data.message + ' Redirecting to login...';
        setTimeout(() => window.location.replace('/login'), 2200);
      } catch (err) {
        alertEl.className = 'alert show alert-error';
        alertEl.textContent = err.message || 'Reset failed. Check your backup code.';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doReset();
    });
  </script>
</body>
</html>
