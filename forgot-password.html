<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — SMM Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">

    <!-- Lock Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-circle">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
      </div>
    </div>

    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-subtitle">Enter your email and create a new password to reset your account.</p>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <form id="resetForm" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
          <input
            type="password"
            id="newPassword"
            placeholder="Create new password"
            autocomplete="new-password"
            required
          />
          <button type="button" class="eye-btn" onclick="togglePw()">
            <svg id="eyeIcon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>
    </form>

    <p class="auth-footer">
      Remember your password?
      <a href="login.html">Log In &rsaquo;</a>
    </p>

  </div>

  <script src="config.js"></script>
  <script>
    function togglePw() {
      const pw   = document.getElementById('newPassword');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = `<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
      } else {
        pw.type = 'password';
        icon.innerHTML = `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      }
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('alert');

      const email       = document.getElementById('email').value.trim();
      const newPassword = document.getElementById('newPassword').value;

      if (!email || !newPassword) {
        showAlert('alert', 'Please fill in all fields.');
        return;
      }
      if (newPassword.length < 6) {
        showAlert('alert', 'New password must be at least 6 characters.');
        return;
      }

      setLoading('resetBtn', true, 'Reset Password');
      try {
        const data = await apiCall('/api/auth/reset-password', 'POST', { email, newPassword });
        showAlert('alert', '✅ ' + data.message + ' Redirecting to login...', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 2500);
      } catch (err) {
        showAlert('alert', err.message);
      } finally {
        setLoading('resetBtn', false, 'Reset Password');
      }
    });
  </script>
</body>
</html>
