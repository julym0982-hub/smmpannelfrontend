<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — SMM Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="dash-page">

  <!-- ═══ SIDEBAR OVERLAY ═══════════════════ -->
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- ═══ SIDEBAR ═══════════════════════════ -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-user">
      <div class="sidebar-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>
      <div>
        <div class="sidebar-name" id="sidebarName">—</div>
        <div class="sidebar-email" id="sidebarEmail">—</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html">🏠&nbsp; Dashboard</a>
      <a href="#">💳&nbsp; Add Funds</a>
      <a href="#">🛒&nbsp; New Order</a>
      <a href="#">📋&nbsp; Orders</a>
      <a href="#">📝&nbsp; Blog</a>
      <button class="logout-btn" onclick="logout()">🚪&nbsp; Logout</button>
    </nav>
  </div>

  <!-- ═══ HEADER ════════════════════════════ -->
  <div class="dash-header">
    <div class="dash-header-inner">

      <!-- Hamburger -->
      <button class="hamburger-btn" onclick="openSidebar()">
        <svg viewBox="0 0 24 24">
          <line x1="3" y1="6"  x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <!-- User Info -->
      <div class="user-avatar-sm">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>

      <div class="user-info">
        <div class="greeting">Welcome back!</div>
        <div class="username">
          <span id="headerName">SMM Panel</span>
          <span class="verified-badge">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          </span>
        </div>
      </div>

      <!-- Balance Card -->
      <div class="balance-card">
        <!-- wallet icon -->
        <svg class="wallet-icon" viewBox="0 0 24 24">
          <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
        <div class="bal-text">
          <div class="bal-amount" id="balanceAmt">$0.00</div>
          <div class="bal-label">Your Balance</div>
        </div>
        <div class="chevron">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </div>
      </div>

    </div>
  </div>
  <!-- /HEADER -->

  <!-- ═══ STAT CARDS ═══════════════════════ -->
  <div class="stat-cards">

    <!-- Add Balance -->
    <div class="stat-card">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      </div>
      <div class="stat-label">Add Balance</div>
      <div class="stat-sub">Top up your balance</div>
      <button class="stat-btn">
        <svg class="stroke-icon" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
      </button>
    </div>

    <!-- Balance Spent -->
    <div class="stat-card">
      <div class="stat-icon">
        <svg class="stroke-icon" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
      </div>
      <div class="stat-label">Balance Spent</div>
      <div class="stat-value" id="balSpent">$0.00</div>
      <button class="stat-btn">
        <svg class="stroke-icon" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
      </button>
    </div>

    <!-- Total Orders -->
    <div class="stat-card">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      </div>
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" id="totalOrders">0</div>
      <button class="stat-btn">
        <svg class="fill-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      </button>
    </div>

  </div>
  <!-- /STAT CARDS -->

  <!-- ═══ SERVICES ══════════════════════════ -->
  <div class="services-wrap">
    <div class="services-card">

      <!-- Header -->
      <div class="services-header">
        <h2>Services</h2>
        <button class="view-all-btn">
          View All
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search Service by ID or Name" oninput="filterServices()" />
        <button class="filter-btn">
          <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        </button>
      </div>

      <!-- Popular Label -->
      <div class="popular-label">
        <span>🔥</span>
        <span>Popular Services</span>
      </div>

      <!-- Social Icons Grid -->
      <div class="social-grid" id="socialGrid">
        <!-- Populated by JS -->
      </div>

    </div>
  </div>
  <!-- /SERVICES -->

  <!-- ═══ BOTTOM NAV ════════════════════════ -->
  <nav class="bottom-nav">

    <button class="nav-item active" id="nav-services" onclick="setTab('services')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Services</span>
    </button>

    <button class="nav-item" id="nav-funds" onclick="setTab('funds')">
      <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      <span>Add Funds</span>
    </button>

    <!-- Center cart -->
    <div>
      <button class="nav-center" id="nav-order" onclick="setTab('order')">
        <div class="nav-center-circle">
          <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.9 18 9 18h12v-2H9.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0023.47 5H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
        <span>New Order</span>
      </button>
    </div>

    <button class="nav-item" id="nav-orders" onclick="setTab('orders')">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      <span>Orders</span>
    </button>

    <button class="nav-item" id="nav-blog" onclick="setTab('blog')">
      <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
      <span>Blog</span>
    </button>

  </nav>
  <!-- /BOTTOM NAV -->

</div><!-- /dash-page -->

<script src="config.js"></script>

// ─── Render social grid ───────────────────────────────
function renderGrid(list) {
  const grid = document.getElementById('socialGrid');
  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:24px;color:#9CA3AF;font-weight:600;">No services found.</div>`;
    return;
  }
  grid.innerHTML = list.map(s => `
    <div class="social-item">
      <div class="social-icon-wrap">${s.svg}</div>
      <span class="social-name">${s.name}</span>
    </div>
  `).join('');
}

function filterServices() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderGrid(SERVICES.filter(s => s.name.toLowerCase().includes(q)));
}

// ─── Bottom Nav tabs ──────────────────────────────────
function setTab(tab) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + tab);
  if (el) el.classList.add('active');
}

// ─── Sidebar ──────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ─── Logout ───────────────────────────────────────────
function logout() {
  localStorage.removeItem('smm_token');
  localStorage.removeItem('smm_user');
  window.location.href = 'login.html';
}

// ─── Init ─────────────────────────────────────────────
(async function init() {
  // Load saved user
  const saved = localStorage.getItem('smm_user');
  let user = saved ? JSON.parse(saved) : null;

  if (user) {
    document.getElementById('headerName').textContent = user.name || 'SMM Panel';
    document.getElementById('sidebarName').textContent  = user.name  || '—';
    document.getElementById('sidebarEmail').textContent = user.email || '—';
    document.getElementById('balanceAmt').textContent   = '$' + (user.balance || 0).toFixed(2);
    document.getElementById('balSpent').textContent     = '$' + (user.balanceSpent || 0).toFixed(2);
    document.getElementById('totalOrders').textContent  = user.totalOrders || 0;
  }

  // Refresh from API
  try {
    const fresh = await apiCall('/api/auth/me');
    localStorage.setItem('smm_user', JSON.stringify(fresh));
    document.getElementById('headerName').textContent = fresh.name  || 'SMM Panel';
    document.getElementById('sidebarName').textContent  = fresh.name  || '—';
    document.getElementById('sidebarEmail').textContent = fresh.email || '—';
    document.getElementById('balanceAmt').textContent   = '$' + (fresh.balance || 0).toFixed(2);
    document.getElementById('balSpent').textContent     = '$' + (fresh.balanceSpent || 0).toFixed(2);
    document.getElementById('totalOrders').textContent  = fresh.totalOrders || 0;
  } catch (_) {
    // keep local data if API fails
  }

  // Render social grid
  renderGrid(SERVICES);
})();

</script>
</body>
